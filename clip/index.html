<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foco+ App Clip</title>

  <!-- App Clip meta tag — invoca o clip ao abrir esta URL no Safari -->
  <meta name="apple-itunes-app"
        content="app-id=APPSTOREID, app-clip-bundle-id=br.com.luizsantana.Foco.Clip, app-clip-display=card" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
      color: #1d1d1f;
    }
    p { color: #6e6e73; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Foco+</h1>
  <p>Abra no Safari no iPhone para usar o App Clip.</p>
</body>
</html>
