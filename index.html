<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foco+ — Capture antes de evaporar</title>

  <!-- App Clip meta tag (Safari invocation) -->
  <meta name="apple-itunes-app"
        content="app-id=APPSTOREID, app-clip-bundle-id=br.com.luizsantana.Foco.Clip, app-clip-display=card" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
      color: #1d1d1f;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 1.1rem; color: #6e6e73; max-width: 420px; line-height: 1.5; }
    .badge {
      margin-top: 32px;
      display: inline-block;
    }
    .badge img { height: 52px; }
  </style>
</head>
<body>
  <div class="icon">🎯</div>
  <h1>Foco+</h1>
  <p>Capture tarefas, ideias e lembretes em segundos — mesmo sem o app instalado.</p>

  <a class="badge"
     href="https://apps.apple.com/app/idAPPSTOREID"
     target="_blank"
     rel="noopener">
    <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg"
         alt="Download on the App Store" />
  </a>
</body>
</html>
